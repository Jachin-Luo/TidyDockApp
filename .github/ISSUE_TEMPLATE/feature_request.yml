name: Feature request
description: Suggest a focused improvement that fits TidyDock's product boundary.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        TidyDock is intentionally lightweight and manual. Please describe the user problem before proposing a solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Proposed workflow
      description: How should the user experience work?
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Product boundary check
      description: Explain why this does not require scanning, monitoring, indexing, task switching, or network behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

