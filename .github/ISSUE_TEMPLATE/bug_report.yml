name: Bug report
description: Report a reproducible TidyDock problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep file paths private if they contain sensitive information.
  - type: input
    id: version
    attributes:
      label: TidyDock version or commit
      placeholder: "0.1.0 / commit hash"
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package type
      options:
        - Installed build
        - Portable build
        - Development build
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Enable edit mode
        2. Drag ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Logs live in `%APPDATA%\TidyDock\logs\error.log`.

